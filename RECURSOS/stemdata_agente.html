<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEMData</title>

  <!-- Leaflet: librería gratuita para el mapa -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #F0EFF8;
      color: #1a1a1a;
    }
    h1 { color: #26215C; }
    p.subtitulo { color: #555; margin-bottom: 24px; }
    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 4px;
      font-size: 14px;
    }
    select, button, input[type="text"] {
      padding: 10px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }
    .fila-formulario {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    button {
      background-color: #534AB7;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 18px;
      font-weight: bold;
    }
    button:hover { background-color: #423a94; }
    #mapa {
      height: 300px;
      margin-top: 20px;
      border-radius: 12px;
      display: none;
    }
    #insignias { margin-top: 18px; display: none; }
    .badge {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 13px;
      margin-right: 10px;
      margin-bottom: 8px;
    }
    #graficas { margin-top: 20px; display: none; }
    .tarjeta-grafica {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 14px;
    }
    .tarjeta-grafica h4 {
      margin: 0 0 12px 0;
      color: #26215C;
      font-size: 14px;
    }
    .fila-barra { margin-bottom: 10px; }
    .fila-barra .etiqueta {
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
      display: flex;
      justify-content: space-between;
    }
    .fondo-barra {
      background: #eee;
      border-radius: 6px;
      height: 16px;
      overflow: hidden;
    }
    .relleno-barra {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }
    .barra-gradiente {
      position: relative;
      height: 14px;
      border-radius: 7px;
      background: linear-gradient(to right, #A32D2D, #854F0B, #534AB7, #0F6E56);
      margin: 14px 4px 24px 4px;
    }
    .marcador-gradiente {
      position: absolute;
      top: -6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      border: 3px solid #26215C;
      transform: translateX(-50%);
    }
    #btnPlaneacion {
      display: none;
      background-color: #0F6E56;
    }
    #btnPlaneacion:hover { background-color: #0b5443; }
    #planeacionInicial {
      display: none;
      margin-top: 16px;
      padding: 18px 20px;
      background: white;
      border-radius: 12px;
      border-left: 5px solid #534AB7;
    }
    #planeacionInicial h3 { margin-top: 0; color: #26215C; }
    #chat {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 12px;
      max-height: 350px;
      overflow-y: auto;
      display: none;
    }
    .mensaje {
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      max-width: 80%;
      line-height: 1.5;
    }
    .mensaje.agente {
      background: #EEEDFE;
      color: #26215C;
      text-align: left;
    }
    .mensaje.usuario {
      background: #534AB7;
      color: white;
      margin-left: auto;
      text-align: left;
    }
    #cajaEntrada {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }
    #entradaUsuario { flex: 1; }
  </style>
</head>
<body>

  <h1>STEMData</h1>
  <p class="subtitulo">Consulta la brecha STEM y la planeación sugerida para tu municipio, con datos oficiales de Saber 11 y conectividad.</p>

  <div class="fila-formulario">
    <div>
      <label for="municipio">Municipio</label>
      <select id="municipio">
        <option value="">Selecciona...</option>
      </select>
    </div>
    <div>
      <label for="zona">Zona</label>
      <select id="zona">
        <option value="URBANO">Urbana</option>
        <option value="RURAL">Rural</option>
      </select>
    </div>
    <div>
      <label for="grado">Grado</label>
      <select id="grado">
        <option value="1">1°</option>
        <option value="2">2°</option>
        <option value="3">3°</option>
        <option value="4">4°</option>
        <option value="5">5°</option>
        <option value="6">6°</option>
        <option value="7">7°</option>
        <option value="8">8°</option>
        <option value="9">9°</option>
        <option value="10">10°</option>
        <option value="11">11°</option>
      </select>
    </div>
  </div>

  <button onclick="consultar()">Consultar</button>

  <div id="mapa"></div>

  <div id="insignias"></div>

  <div id="graficas"></div>

  <button id="btnPlaneacion" onclick="mostrarPlaneacionInicial()">Ver planeación inicial</button>
  <div id="planeacionInicial"></div>

  <div id="chat"></div>

  <div id="cajaEntrada">
    <input type="text" id="entradaUsuario" placeholder="Escríbele al agente..."
           onkeypress="if(event.key==='Enter') enviarMensaje()">
    <button onclick="enviarMensaje()" style="margin-top:0; width:auto; padding:10px 18px;">Enviar</button>
  </div>

    // ============================================================
    // FUNCIONES DE APOYO
    // ============================================================
    function obtenerBanda(grado) {
      const g = parseInt(grado);
      if (g <= 5) return 'primaria';
      if (g <= 9) return 'secundaria';
      return 'media';
    }

    function proyectosCompatibles(fila) {
      return BANCO_PROYECTOS.filter(p => p.conectividad.includes(fila.nivel_conectividad));
    }

    function municipioSimilar(fila) {
      let mejor = null;
      let mejorDistancia = Infinity;
      for (const otro of DATOS) {
        if (otro.municipio === fila.municipio && otro.zona === fila.zona) continue;
        const diferenciaStem = (otro.puntaje_stem - fila.puntaje_stem) / 100;
        const diferenciaConectividad = (otro.total_accesos_internet - fila.total_accesos_internet) / 500000;
        const distancia = Math.sqrt(diferenciaStem ** 2 + diferenciaConectividad ** 2);
        if (distancia < mejorDistancia) {
          mejorDistancia = distancia;
          mejor = otro;
        }
      }
      return mejor;
    }

    function agregarMensaje(texto, quien) {
      const chat = document.getElementById('chat');
      const burbuja = document.createElement('div');
      burbuja.className = 'mensaje ' + quien;
      burbuja.innerHTML = texto;
      chat.appendChild(burbuja);
      chat.scrollTop = chat.scrollHeight;
    }

    // ============================================================
    // RECONOCIMIENTO DE INTENCIÓN (PLN básico)
    // ============================================================
    function reconocerIntencion(texto) {
      texto = texto.toLowerCase();
      const intenciones = {
        detalle: ['detalle', 'actividad', 'mas info', 'más info', 'explica'],
        momentos: ['momento', 'apertura', 'desarrollo', 'cierre', 'como empiezo', 'cómo empiezo'],
        recursos: ['material', 'recurso', 'equipo', 'necesito', 'que debo tener', 'qué debo tener'],
        evaluacion: ['evalu', 'calificar', 'como mido', 'cómo mido', 'instrumento'],
        retroalimentacion: ['retroalimenta', 'feedback', 'como corrijo', 'cómo corrijo'],
        habilidad: ['socioemocional', 'habilidad blanda', 'actitud'],
        otro_proyecto: ['otra opcion', 'otra opción', 'otro proyecto', 'diferente', 'mas opciones', 'más opciones'],
        componentes_stem: ['componentes stem', 'enfoque stem', 'pilares', 'ciencia tecnologia ingenieria matematicas'],
        reto_ciclo: ['reto', 'problema real', 'ciclo de diseno', 'ciclo de diseño', 'ciclo', 'preguntar imaginar', 'ingenieria', 'ingeniería', 'tecnologia', 'tecnología'],
        similar: ['parecido', 'similar', 'otro municipio', 'comparar']
      };
      for (const intencion in intenciones) {
        for (const palabra of intenciones[intencion]) {
          if (texto.includes(palabra)) return intencion;
        }
      }
      return 'desconocida';
    }

    // ============================================================
    // GENERAR RESPUESTA SEGÚN LA INTENCIÓN
    // ============================================================
    let filaActual = null;
    let indiceProyectoActual = 0;

    function generarRespuesta(intencion) {
      const fila = filaActual;
      const banda = obtenerBanda(document.getElementById('grado').value);
      const opciones = proyectosCompatibles(fila);
      const proyecto = opciones[indiceProyectoActual];

      if (intencion === 'detalle') {
        return `<b>${proyecto.titulo}</b> (${proyecto.transversalidad})<br>
          <b>Aprendizaje esperado:</b> ${proyecto.aprendizajeEsperado[banda]}<br>
          <b>Duración:</b> ${proyecto.duracion}<br><br>
          Puedes preguntarme por los "momentos" (apertura/desarrollo/cierre), los "recursos",
          la "evaluación", la "retroalimentación", o la "habilidad socioemocional" de esta actividad.`;
      }
      if (intencion === 'momentos') {
        return `<b>Apertura:</b> ${proyecto.momentos.apertura}<br><br>
          <b>Desarrollo:</b> ${proyecto.momentos.desarrollo}<br><br>
          <b>Cierre:</b> ${proyecto.momentos.cierre}`;
      }
      if (intencion === 'recursos') {
        return `<b>Equipo:</b> ${proyecto.recursos.equipo}<br>
          <b>Material:</b> ${proyecto.recursos.material}<br>
          <b>Fuentes de información:</b> ${proyecto.recursos.fuentes}`;
      }
      if (intencion === 'evaluacion') {
        return `<b>Tipo:</b> ${proyecto.evaluacion.tipo}<br>
          <b>¿Quién evalúa?:</b> ${proyecto.evaluacion.agente}<br>
          <b>Instrumento:</b> ${proyecto.evaluacion.instrumento}`;
      }
      if (intencion === 'retroalimentacion') {
        return proyecto.retroalimentacion;
      }
      if (intencion === 'habilidad') {
        return `Esta actividad trabaja principalmente: ${proyecto.habilidadSocioemocional}`;
      }
      if (intencion === 'reto_ciclo') {
        const c = proyecto.cicloDiseno;
        return `<b>🎯 Reto del mundo real:</b> ${proyecto.retoMundoReal}<br>
          <i>(Tipo de integración: ${proyecto.tipoIntegracion})</i><br><br>
          <b>Ciclo de diseño de esta actividad:</b><br>
          1️⃣ <b>Preguntar:</b> ${c.preguntar}<br>
          2️⃣ <b>Imaginar:</b> ${c.imaginar}<br>
          3️⃣ <b>Planificar:</b> ${c.planificar}<br>
          4️⃣ <b>Crear:</b> ${c.crear}<br>
          5️⃣ <b>Probar y mejorar:</b> ${c.probarYMejorar}<br>
          6️⃣ <b>Comunicar:</b> ${c.comunicar}`;
      }
      if (intencion === 'componentes_stem') {
        return `<b>Cómo esta actividad integra los 4 pilares STEM:</b><br><br>
          🔬 <b>Ciencia:</b> ${proyecto.componentesSTEM.ciencia}<br><br>
          🛠️ <b>Tecnología:</b> ${proyecto.componentesSTEM.tecnologia}<br><br>
          ⚙️ <b>Ingeniería:</b> ${proyecto.componentesSTEM.ingenieria}<br><br>
          🔢 <b>Matemáticas:</b> ${proyecto.componentesSTEM.matematicas}`;
      }
      if (intencion === 'otro_proyecto') {
        indiceProyectoActual = (indiceProyectoActual + 1) % opciones.length;
        const nuevo = opciones[indiceProyectoActual];
        return `Otra opción: <b>${nuevo.titulo}</b> (${nuevo.transversalidad})<br>
          <b>Aprendizaje esperado:</b> ${nuevo.aprendizajeEsperado[banda]}<br><br>
          Pregúntame por sus "momentos", "recursos", "evaluación" o "retroalimentación" cuando quieras.`;
      }
      if (intencion === 'similar') {
        const otro = municipioSimilar(fila);
        const zonaOtro = otro.zona === 'RURAL' ? 'Rural' : 'Urbana';
        return `Un municipio con condiciones parecidas es <b>${otro.municipio} (${zonaOtro})</b>, con brecha ${otro.nivel_brecha} y conectividad ${otro.nivel_conectividad}.`;
      }
      return 'No estoy seguro de haber entendido. Puedes preguntarme por "detalle", "el reto" (o "ciclo de diseño"), "momentos", "recursos", "evaluación", "retroalimentación", "habilidad socioemocional", "componentes STEM", "otro proyecto" o un municipio "similar".';
    }

    function promedioNacional(campo) {
      const suma = DATOS.reduce((acumulado, fila) => acumulado + fila[campo], 0);
      return suma / DATOS.length;
    }

    function mostrarGraficas(fila) {
      const maxVal = 100; // los puntajes Saber 11 van de 0 a 100
      const promCiencias = promedioNacional('promedio_ciencias');
      const promMatematicas = promedioNacional('promedio_matematicas');

      const pctCienciasMun = Math.min(fila.promedio_ciencias / maxVal * 100, 100);
      const pctCienciasNac = Math.min(promCiencias / maxVal * 100, 100);
      const pctMateMun = Math.min(fila.promedio_matematicas / maxVal * 100, 100);
      const pctMateNac = Math.min(promMatematicas / maxVal * 100, 100);

      const colorMunicipio = '#534AB7';
      const colorNacional = '#B9B6E3';

      // Posición del municipio en la barra de gradiente de conectividad
      const posicionMarcador = POSICION_CONECTIVIDAD[fila.nivel_conectividad];

      document.getElementById('graficas').innerHTML = `
        <div class="tarjeta-grafica">
          <h4>📊 Tu municipio vs. el promedio nacional (puntaje STEM)</h4>

          <div class="fila-barra">
            <div class="etiqueta"><span>Ciencias — ${fila.municipio}</span><span>${fila.promedio_ciencias.toFixed(1)}</span></div>
            <div class="fondo-barra"><div class="relleno-barra" style="width:${pctCienciasMun}%; background:${colorMunicipio};"></div></div>
          </div>
          <div class="fila-barra">
            <div class="etiqueta"><span>Ciencias — Promedio nacional</span><span>${promCiencias.toFixed(1)}</span></div>
            <div class="fondo-barra"><div class="relleno-barra" style="width:${pctCienciasNac}%; background:${colorNacional};"></div></div>
          </div>
          <div class="fila-barra">
            <div class="etiqueta"><span>Matemáticas — ${fila.municipio}</span><span>${fila.promedio_matematicas.toFixed(1)}</span></div>
            <div class="fondo-barra"><div class="relleno-barra" style="width:${pctMateMun}%; background:${colorMunicipio};"></div></div>
          </div>
          <div class="fila-barra">
            <div class="etiqueta"><span>Matemáticas — Promedio nacional</span><span>${promMatematicas.toFixed(1)}</span></div>
            <div class="fondo-barra"><div class="relleno-barra" style="width:${pctMateNac}%; background:${colorNacional};"></div></div>
          </div>
        </div>

        <div class="tarjeta-grafica">
          <h4>📶 Dónde te ubicas en conectividad nacional</h4>
          <div class="barra-gradiente">
            <div class="marcador-gradiente" style="left:${posicionMarcador}%;"></div>
          </div>
          <div class="etiqueta">
            <span>Sin conectividad</span><span>Conectividad alta</span>
          </div>
        </div>
      `;
      document.getElementById('graficas').style.display = 'block';
    }


    function consultar() {
      const municipioElegido = document.getElementById('municipio').value;
      const zonaElegida = document.getElementById('zona').value;

      if (!municipioElegido) {
        alert('Por favor selecciona un municipio.');
        return;
      }

      const fila = DATOS.find(d => d.municipio === municipioElegido && d.zona === zonaElegida);
      if (!fila) {
        alert('No hay datos para ese municipio en esa zona. Prueba con la otra zona.');
        return;
      }

      filaActual = fila;
      indiceProyectoActual = 0;

      // Reiniciar todo lo que pudiera venir de una consulta anterior
      document.getElementById('chat').innerHTML = '';
      document.getElementById('chat').style.display = 'none';
      document.getElementById('cajaEntrada').style.display = 'none';
      document.getElementById('planeacionInicial').style.display = 'none';

      mostrarInsignias(fila);
      mostrarGraficas(fila);
      moverMapa(fila.lat, fila.lon, fila.municipio.charAt(0) + fila.municipio.slice(1).toLowerCase());

      document.getElementById('btnPlaneacion').style.display = 'inline-block';
    }

    // ============================================================
    // MOSTRAR LA PLANEACIÓN INICIAL (al hacer clic en el botón)
    // ============================================================
    function mostrarPlaneacionInicial() {
      const fila = filaActual;
      const banda = obtenerBanda(document.getElementById('grado').value);
      const opciones = proyectosCompatibles(fila);
      indiceProyectoActual = 0;
      const proyecto = opciones[indiceProyectoActual];

      document.getElementById('planeacionInicial').innerHTML = `
        <h3>${proyecto.titulo}</h3>
        <p><b>🎯 Reto:</b> ${proyecto.retoMundoReal}</p>
        <p><b>Áreas integradas:</b> ${proyecto.transversalidad}</p>
        <p><b>Aprendizaje esperado:</b> ${proyecto.aprendizajeEsperado[banda]}</p>
        <p><b>Duración:</b> ${proyecto.duracion}</p>
      `;
      document.getElementById('planeacionInicial').style.display = 'block';

      // Abrir el chat para que el docente pueda profundizar
      document.getElementById('chat').innerHTML = '';
      document.getElementById('chat').style.display = 'block';
      document.getElementById('cajaEntrada').style.display = 'flex';

      const mensajeApertura = `
        ¿Quieres profundizar en esta planeación? Puedes preguntarme por los "momentos"
        (apertura/desarrollo/cierre), los "recursos", la "evaluación", la "retroalimentación",
        la "habilidad socioemocional", el "reto" que resuelve y su "ciclo de diseño", los "componentes STEM"
        (cómo integra ciencia, tecnología, ingeniería y matemáticas), un municipio "similar", u "otro proyecto" si quieres ver otra opción.
      `;
      agregarMensaje(mensajeApertura, 'agente');
    }

    // ============================================================
    // ENVIAR MENSAJE (caja de chat)
    // ============================================================
    function enviarMensaje() {
      const entrada = document.getElementById('entradaUsuario');
      const texto = entrada.value.trim();
      if (!texto) return;

      agregarMensaje(texto, 'usuario');
      entrada.value = '';

      const intencion = reconocerIntencion(texto);
      const respuesta = generarRespuesta(intencion);

      setTimeout(() => {
        agregarMensaje(respuesta, 'agente');
      }, 400);
    }
  </script>
